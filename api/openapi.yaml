openapi: 3.0.3
info:
  title: Electricity GDP Insights API (National)
  version: 0.2.0
  description: National-only API using actual MoSPI ENERGY and NAS snapshots.
servers:
  - url: https://api.example.com

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

  /v1/summary:
    get:
      summary: Latest summary cards
      responses:
        '200':
          description: Summary payload

  /v1/metrics:
    get:
      summary: Get a national annual metric series
      parameters:
        - name: metric_id
          in: query
          required: true
          schema:
            type: string
            enum:
              - electricity_total_ktoe
              - electricity_industry_ktoe
              - gdp_constant_crore
              - gdp_current_crore
              - gdp_growth_rate_percent
        - name: start_year
          in: query
          schema:
            type: string
        - name: end_year
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Metric series
        '404':
          description: Not found

  /v1/metrics/correlation:
    get:
      summary: Correlation between two national metrics
      parameters:
        - name: x_metric_id
          in: query
          required: true
          schema:
            type: string
        - name: y_metric_id
          in: query
          required: true
          schema:
            type: string
        - name: start_year
          in: query
          schema:
            type: string
        - name: end_year
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Correlation payload
        '404':
          description: Not found
